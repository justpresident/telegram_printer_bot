name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write  # allow the badge commit on push to main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot pytest pytest-asyncio pytest-cov coverage-badge

      - name: Run tests with coverage
        run: |
          python -m pytest tests.py \
            --cov=printerbot \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Generate coverage badge
        run: |
          mkdir -p .github/badges
          coverage-badge -o .github/badges/coverage.svg -f

      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- .github/badges/coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/coverage.svg
            git commit -m "Update coverage badge [skip ci]"
            git push
          else
            echo "Coverage badge unchanged."
          fi
